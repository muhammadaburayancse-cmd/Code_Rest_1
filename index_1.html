<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Algorithm Summer 2025 — Problem Suggester</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Sora:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0f14;
    --surface: #151820;
    --surface2: #1c2030;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.13);
    --text: #e8eaf0;
    --muted: #7a7f8e;
    --accent: #4f8ef7;
    --accent2: #7c5cbf;
    --green: #3ecf8e;
    --amber: #f5a623;
    --red: #f06060;
    --pink: #e879a0;
    --teal: #2dd4bf;
    --coral: #f4845f;
    --radius: 12px;
    --mono: 'JetBrains Mono', monospace;
    --sans: 'Sora', sans-serif;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: var(--sans);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 0;
  }

  /* Header */
  .header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 24px 32px 20px;
    position: sticky;
    top: 0;
    z-index: 10;
  }
  .header-inner { max-width: 1100px; margin: 0 auto; }
  .header h1 {
    font-size: 18px;
    font-weight: 600;
    letter-spacing: -0.02em;
    color: var(--text);
    margin-bottom: 4px;
  }
  .header-sub {
    font-size: 12px;
    color: var(--muted);
    font-family: var(--mono);
  }
  .header-sub span { color: var(--accent); }

  /* Tabs */
  .tabs-bar {
    max-width: 1100px;
    margin: 0 auto;
    padding: 20px 32px 0;
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }
  .tab {
    padding: 7px 16px;
    border-radius: 8px;
    border: 1px solid var(--border2);
    font-size: 12px;
    font-family: var(--mono);
    cursor: pointer;
    background: transparent;
    color: var(--muted);
    transition: all 0.15s;
    font-weight: 400;
  }
  .tab:hover { color: var(--text); border-color: rgba(255,255,255,0.25); }
  .tab.active { background: var(--accent); color: #fff; border-color: transparent; font-weight: 600; }

  /* Main content */
  .main { max-width: 1100px; margin: 0 auto; padding: 28px 32px 60px; }

  .intro-box {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 18px;
    font-size: 13px;
    color: var(--muted);
    line-height: 1.7;
    margin-bottom: 28px;
    border-left: 3px solid var(--accent);
  }

  .section-label {
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 12px;
  }

  /* Suggested problems */
  .suggest-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 12px;
    margin-bottom: 32px;
  }
  .suggest-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    transition: border-color 0.15s, transform 0.15s;
    position: relative;
    overflow: hidden;
  }
  .suggest-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
  }
  .suggest-card:hover { border-color: var(--border2); transform: translateY(-1px); }

  .card-row { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 8px; }
  .card-idx {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    padding-top: 2px;
    min-width: 18px;
  }
  .card-name {
    font-size: 14px;
    font-weight: 500;
    color: var(--text);
    text-decoration: none;
    line-height: 1.4;
  }
  .card-name:hover { color: var(--accent); }
  .card-meta { display: flex; gap: 6px; margin-bottom: 8px; padding-left: 28px; }
  .badge {
    font-family: var(--mono);
    font-size: 10px;
    padding: 2px 8px;
    border-radius: 4px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .badge-easy { background: rgba(62,207,142,0.15); color: var(--green); }
  .badge-med { background: rgba(245,166,35,0.15); color: var(--amber); }
  .badge-hard { background: rgba(240,96,96,0.15); color: var(--red); }
  .card-tip {
    font-size: 12px;
    color: var(--muted);
    padding-left: 28px;
    line-height: 1.5;
  }

  /* Existing problems */
  .existing-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 8px;
  }
  .existing-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    display: flex;
    align-items: center;
    gap: 10px;
    opacity: 0.7;
  }
  .existing-num {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--muted);
    min-width: 26px;
  }
  .existing-name { font-size: 13px; color: var(--text); flex: 1; }
  .solve-count {
    font-family: var(--mono);
    font-size: 10px;
    padding: 2px 7px;
    border-radius: 4px;
    background: rgba(62,207,142,0.12);
    color: var(--green);
  }
  .solve-zero { background: rgba(122,127,142,0.12); color: var(--muted); }

  .panel { display: none; }
  .panel.active { display: block; }

  /* Color accents per topic */
  .c-adhoc::before { background: var(--accent2); }
  .c-linear::before { background: var(--teal); }
  .c-binary::before { background: var(--accent); }
  .c-sorting::before { background: var(--coral); }
  .c-greedy::before { background: var(--amber); }
  .c-dp::before { background: var(--pink); }
  .c-easy::before { background: var(--green); }
  .c-graph::before { background: var(--muted); }

  /* Stats bar */
  .stats-bar {
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
    margin-bottom: 28px;
  }
  .stat {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 16px;
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .stat-val { font-family: var(--mono); font-size: 20px; font-weight: 600; color: var(--text); }
  .stat-lbl { font-size: 11px; color: var(--muted); }

  @media (max-width: 600px) {
    .header, .tabs-bar, .main { padding-left: 16px; padding-right: 16px; }
    .suggest-grid, .existing-grid { grid-template-columns: 1fr; }
  }
</style>
</head>

  // Intro
  const intro = document.createElement('div');
  intro.className = 'intro-box';
  intro.textContent = d.intro;
  panel.appendChild(intro);

  // Suggested
  const sl = document.createElement('div');
  sl.className = 'section-label';
  sl.textContent = `✦ Suggested problems to add (${d.suggest.length})`;
  panel.appendChild(sl);

  const sg = document.createElement('div');
  sg.className = 'suggest-grid';
  d.suggest.forEach((p, idx) => {
    const card = document.createElement('div');
    card.className = `suggest-card ${d.cls}`;
    card.innerHTML = `
      <div class="card-row">
        <span class="card-idx">0${idx+1}</span>
        <a href="${p.link}" target="_blank" class="card-name">${p.name} ↗</a>
      </div>
      <div class="card-meta">
        <span class="badge badge-${p.diff === 'med' ? 'med' : p.diff === 'hard' ? 'hard' : 'easy'}">${p.diff === 'med' ? 'medium' : p.diff}</span>
      </div>
      <div class="card-tip">${p.tip}</div>
    `;
    sg.appendChild(card);
  });
  panel.appendChild(sg);

  // Existing
  const el = document.createElement('div');
  el.className = 'section-label';
  el.style.marginTop = '8px';
  el.textContent = `Already in tracker (${d.existing.length} problems)`;
  panel.appendChild(el);

  const eg = document.createElement('div');
  eg.className = 'existing-grid';
  d.existing.forEach(p => {
    const card = document.createElement('div');
    card.className = 'existing-card';
    card.innerHTML = `
      <span class="existing-num">#${p.num}</span>
      <span class="existing-name">${p.name}</span>
      <span class="solve-count ${p.solved === 0 ? 'solve-zero' : ''}">${p.solved} solved</span>
    `;
    eg.appendChild(card);
  });
  panel.appendChild(eg);

  panelsEl.appendChild(panel);
});
</script>
</body>
</html>
